name: CI

# Fast feedback on every PR + every push to main. Keeps deploy.yml
# small — the main branch workflow trusts that this passed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps (no local/heavy ML groups)
        run: uv sync --frozen

      # Mirrors `make check`'s lint step. Lint only — formatting isn't
      # enforced (see [tool.ruff] in pyproject.toml).
      - name: Lint (ruff)
        run: uv run ruff check apps packages tests

      # Tests that need pgvector or external embeddings skip themselves
      # when those aren't available, so a plain `pytest` is safe here.
      - name: Run pytest
        run: uv run pytest -q

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - run: npx tsc --noEmit

      # `next build` reads env at build time; supply dummy auth values
      # so the build doesn't fail just because real Cognito credentials
      # aren't in CI. AUTH_DISABLED=true keeps the validator happy.
      - name: Build
        env:
          AUTH_DISABLED: "true"
          SESSION_SECRET: ci-only-placeholder-secret-not-used-at-runtime
        run: npx next build

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build only — don't push. Catches Dockerfile breakage on PRs
      # before deploy.yml ever runs.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
