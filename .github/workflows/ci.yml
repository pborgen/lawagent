name: CI

# Fast feedback on every PR + every push to main. Keeps deploy.yml
# small — the main branch workflow trusts that this passed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps (no local/heavy ML groups)
        run: uv sync --frozen

      # Tests that need pgvector or external embeddings skip themselves
      # when those aren't available, so a plain `pytest` is safe here.
      - name: Run pytest
        run: uv run pytest -q

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build only — don't push. Catches Dockerfile breakage on PRs
      # before deploy.yml ever runs.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
