# Per-state source registry for the multi-state knowledge base.
#
# Adding a state = adding a block here, not changing code. Each state's
# statutes are crawled from <public_law_subdomain>.public.law (uniform
# TOC -> article -> section structure; robots.txt permits /laws/). Forms
# and practice rules are explicit per-state spec lists pointing at that
# state's official site. Case law is pulled (bounded) from CourtListener.
#
# Loader + validation: packages/corpus/jurisdictions.py
#
# NOTE on collections: each state gets its own pgvector collection
# (`<slug>-law__<embeddings-model-slug>`), EXCEPT Connecticut, which keeps
# the legacy `ct-divorce` base so existing CT vectors need no re-ingest.
# See llm.collection_for. The canonical state identifier everywhere is the
# slug (e.g. `ny`), never the display name.
#
# NOTE on reachability: many official state court/legislature sites block
# automated requests (NY's nycourts.gov and nysenate.gov both return 403).
# When that happens, leave `forms`/`practice_rules` empty — the statute
# leg (public.law) is the reliable backbone. Populate the spec lists only
# for states whose official sources are actually fetchable.

states:
  ny:
    name: New York
    public_law_subdomain: newyork
    statutes:
      - code_root: n.y._domestic_relations_law
        title: New York Domestic Relations Law
        citation_format: "N.Y. Dom. Rel. Law § {section}"
        issuing_body: New York State Legislature
        # articles: null  -> crawl the whole code. Restrict to specific
        # public.law article slugs (e.g. n.y._domestic_relations_law_article_10)
        # to scope a focused divorce KB.
        articles: null
    # nycourts.gov blocks bots (403) — populate when a reachable source exists.
    forms: []
    practice_rules: []
    # CourtListener court IDs for bounded case-law seeding (Phase 6).
    courtlistener_courts:
      - ny        # New York Court of Appeals
      - nyappdiv  # Appellate Division

  tx:
    name: Texas
    public_law_subdomain: texas
    statutes:
      - code_root: tex._fam._code
        title: Texas Family Code
        citation_format: "Tex. Fam. Code § {section}"
        issuing_body: Texas Legislature
        # Texas uses /statutes/ with a deep title->subtitle->chapter->section
        # tree, so it needs the hierarchical crawler.
        base_path: /statutes/
        layout: tx_hierarchical
        # Scope to "Subtitle C — Dissolution of Marriage" (chapters 6-9:
        # suit for dissolution, marital property, maintenance). Drop this to
        # crawl the whole Family Code.
        articles:
          - tex._fam._code_title_1_subtitle_c
    forms: []
    practice_rules: []
    courtlistener_courts:
      - tex        # Texas Supreme Court
      - texapp     # Texas Courts of Appeals

  ct:
    name: Connecticut
    # Connecticut is NOT on public.law. Its authoritative corpus comes from
    # the official CT sources (cga.ct.gov statutes, jud.ct.gov forms/Practice
    # Book) via the bespoke `fetch-public` fetcher. `fetch-state --state ct`
    # delegates there. CT keeps the legacy `ct-divorce` collection.
    fetcher: official
    official_handler: ct_bespoke

  ca:
    name: California
    public_law_subdomain: california
    statutes:
      - code_root: family_code
        title: California Family Code
        citation_format: "Cal. Fam. Code § {section}"
        issuing_body: California State Legislature
        base_path: /codes/
        # Same cumulative-container shape as TX; CA just serves under /codes/.
        layout: tx_hierarchical
        # Division 6: Nullity, Dissolution, and Legal Separation (~126 sections).
        articles:
          - family_code,_division_6
    forms: []
    practice_rules: []
    courtlistener_courts:
      - cal        # Supreme Court of California
      - calctapp   # California Courts of Appeal

  fl:
    name: Florida
    public_law_subdomain: florida
    statutes:
      - code_root: fla._stat.
        title: Florida Statutes
        citation_format: "Fla. Stat. § {section}"
        issuing_body: Florida Legislature
        base_path: /statutes/
        # Flat section slugs (fla._stat._61.08) with no "_section_" token.
        layout: flat_section
        section_prefix: fla._stat.
        # Chapter 61 — Dissolution of Marriage; Support; Time-sharing (Parts I-IV).
        articles:
          - fla._stat._chapter_61_part_i
          - fla._stat._chapter_61_part_ii
          - fla._stat._chapter_61_part_iii
          - fla._stat._chapter_61_part_iv
    forms: []
    practice_rules: []
    courtlistener_courts:
      - fla        # Supreme Court of Florida
      - fladistctapp  # Florida District Courts of Appeal

  or:
    name: Oregon
    public_law_subdomain: oregon
    statutes:
      - code_root: ors_chapter_107
        title: Oregon Revised Statutes
        citation_format: "Or. Rev. Stat. § {section}"
        issuing_body: Oregon Legislative Assembly
        base_path: /statutes/
        # Each ORS chapter is its own root that lists flat ors_<num> sections.
        layout: flat_section
        section_prefix: ors
        # Chapter 107 — Marital Dissolution, Annulment and Separation (~109 sections).
        articles:
          - ors_chapter_107
    forms: []
    practice_rules: []
    courtlistener_courts:
      - or         # Oregon Supreme Court
      - orctapp    # Oregon Court of Appeals

  co:
    name: Colorado
    public_law_subdomain: colorado
    statutes:
      - code_root: crs_title_14
        title: Colorado Revised Statutes
        citation_format: "Colo. Rev. Stat. § {section}"
        issuing_body: Colorado General Assembly
        base_path: /statutes/
        # Flat section slugs (crs_14-10-106); seed the dissolution article.
        layout: flat_section
        section_prefix: crs
        # Title 14, Article 10 — Uniform Dissolution of Marriage Act (~56 sections).
        articles:
          - crs_title_14_article_10
    forms: []
    practice_rules: []
    courtlistener_courts:
      - colo       # Colorado Supreme Court
      - coloctapp  # Colorado Court of Appeals

  nv:
    name: Nevada
    public_law_subdomain: nevada
    statutes:
      - code_root: nrs_chapter_125
        title: Nevada Revised Statutes
        citation_format: "Nev. Rev. Stat. § {section}"
        issuing_body: Nevada Legislature
        base_path: /statutes/
        # Flat section slugs (nrs_125.180); chapter 125 lists sections via
        # sub-chapters, so seed those directly.
        layout: flat_section
        section_prefix: nrs
        articles:
          - nrs_chapter_125_sub-chapter_general_provisions
          - nrs_chapter_125_sub-chapter_divorce
          - nrs_chapter_125_sub-chapter_separate_maintenance
          - nrs_chapter_125_sub-chapter_annulment
    forms: []
    practice_rules: []
    courtlistener_courts:
      - nev        # Supreme Court of Nevada
      - nevapp     # Nevada Court of Appeals

  # --- States not on public.law: bespoke official-site crawlers ---------------
  # Each official legislature site is unique, so each has its own crawler module
  # (apps/ingest/src/official_<slug>.py), dispatched via official_handler.

  il:
    name: Illinois
    # 750 ILCS 5 (Illinois Marriage and Dissolution of Marriage Act), ilga.gov.
    fetcher: official
    official_handler: il
    courtlistener_courts:
      - ill        # Illinois Supreme Court
      - illappct   # Illinois Appellate Court

  oh:
    name: Ohio
    # Ohio Revised Code Chapter 3105 (Divorce, Alimony...), codes.ohio.gov.
    fetcher: official
    official_handler: oh
    courtlistener_courts:
      - ohio       # Ohio Supreme Court
      - ohioctapp  # Ohio Courts of Appeals

  pa:
    name: Pennsylvania
    # 23 Pa.C.S. Part IV (Divorce), legis.state.pa.us.
    fetcher: official
    official_handler: pa
    courtlistener_courts:
      - pa         # Pennsylvania Supreme Court
      - pasuperct  # Pennsylvania Superior Court

  nc:
    name: North Carolina
    # N.C. Gen. Stat. Chapter 50 (Divorce and Alimony), ncleg.gov.
    fetcher: official
    official_handler: nc
    courtlistener_courts:
      - nc         # North Carolina Supreme Court
      - ncctapp    # North Carolina Court of Appeals

  mi:
    name: Michigan
    # Mich. Comp. Laws Chapter 552 (Divorce), legislature.mi.gov.
    fetcher: official
    official_handler: mi
    courtlistener_courts:
      - mich       # Michigan Supreme Court
      - michctapp  # Michigan Court of Appeals

  va:
    name: Virginia
    # Va. Code Title 20, Chapter 6 (Divorce), law.lis.virginia.gov.
    fetcher: official
    official_handler: va
    courtlistener_courts:
      - va         # Supreme Court of Virginia
      - vactapp    # Court of Appeals of Virginia

  wa:
    name: Washington
    # Wash. Rev. Code Chapter 26.09 (Dissolution), app.leg.wa.gov.
    fetcher: official
    official_handler: wa
    courtlistener_courts:
      - wash       # Washington Supreme Court
      - washctapp  # Washington Court of Appeals

  az:
    name: Arizona
    # Ariz. Rev. Stat. Title 25, Chapter 3 (Dissolution), azleg.gov.
    fetcher: official
    official_handler: az
    courtlistener_courts:
      - ariz       # Arizona Supreme Court
      - arizctapp  # Arizona Court of Appeals

  ma:
    name: Massachusetts
    # Mass. Gen. Laws ch. 208 (Divorce), malegislature.gov.
    fetcher: official
    official_handler: ma
    courtlistener_courts:
      - mass       # Massachusetts Supreme Judicial Court
      - massappct  # Massachusetts Appeals Court

  in:
    name: Indiana
    # Ind. Code Title 31, Art. 15 (Dissolution), iga.in.gov.
    fetcher: official
    official_handler: in
    courtlistener_courts:
      - ind        # Indiana Supreme Court
      - indctapp   # Indiana Court of Appeals

  mo:
    name: Missouri
    # Mo. Rev. Stat. Chapter 452 (Dissolution), revisor.mo.gov.
    fetcher: official
    official_handler: mo
    courtlistener_courts:
      - mo         # Supreme Court of Missouri
      - moctapp    # Missouri Court of Appeals

  md:
    name: Maryland
    # Md. Code, Fam. Law Titles 7 (Divorce) & 11 (Alimony), mgaleg.maryland.gov.
    fetcher: official
    official_handler: md
    courtlistener_courts:
      - md         # Maryland Supreme Court
      - mdctspecapp  # Appellate Court of Maryland

  # Deferred (need a JS-rendering/Playwright crawler or a licensed feed; the
  # only reachable official sources are JS-locked and all free mirrors 403):
  #   NJ — njleg LIS (Folio NXT app)
  #   TN — T.C.A. is LexisNexis-only (advance.lexis.com SPA)
  # Skipped (only free source is stale): GA (ga.elaws.us = 2013 snapshot)
