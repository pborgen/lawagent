# Approximate model pricing, in USD per 1,000,000 tokens.
#
# Used to turn the token counts in `lawagent_llm_usage` into a rough
# dollar figure on the admin dashboard. These are list prices and drift
# over time — keep them roughly current, but the cost shown is always an
# estimate, computed and stored at write time so historical rows don't
# move when these numbers change.
#
# Embeddings only consume input tokens, so their `output_per_mtok` is 0.
# Fully local providers (local / ollama) are free → omit them and the
# cost shows as "—".
#
# Keys are matched case-insensitively against the model name recorded on
# each usage event. Loader lives in packages/llm/pricing.py.

models:
  # --- Anthropic (chat) ---
  claude-opus-4-7:
    input_per_mtok: 15.0
    output_per_mtok: 75.0
  claude-opus-4-8:
    input_per_mtok: 15.0
    output_per_mtok: 75.0
  claude-sonnet-4-6:
    input_per_mtok: 3.0
    output_per_mtok: 15.0
  # Anthropic Claude on Bedrock (Converse model IDs).
  anthropic.claude-3-5-sonnet-20241022-v2:0:
    input_per_mtok: 3.0
    output_per_mtok: 15.0

  # --- OpenAI ---
  gpt-4o:
    input_per_mtok: 2.5
    output_per_mtok: 10.0
  text-embedding-3-small:
    input_per_mtok: 0.02
    output_per_mtok: 0.0

  # --- Voyage (embeddings) ---
  voyage-3:
    input_per_mtok: 0.06
    output_per_mtok: 0.0

  # --- Amazon Bedrock (embeddings) ---
  amazon.titan-embed-text-v2:0:
    input_per_mtok: 0.02
    output_per_mtok: 0.0
